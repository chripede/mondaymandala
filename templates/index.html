<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🖨️ Mandala Printer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { margin-bottom: 1.5rem; font-size: 1.4rem; }
    input[type=url] {
      width: 100%;
      padding: .7rem 1rem;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: .8rem;
    }
    input[type=url]:focus {
      outline: none;
      border-color: #666;
    }
    button {
      width: 100%;
      padding: .75rem;
      font-size: 1rem;
      background: #222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #444; }
    button:disabled { background: #aaa; cursor: default; }
    #status {
      margin-top: 1rem;
      font-size: .95rem;
      min-height: 1.4rem;
    }
    .ok  { color: #2a7a2a; }
    .err { color: #b00; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🖨️ Mandala Printer</h1>
    <input type="url" id="url" placeholder="https://mondaymandala.com/..." />
    <button id="btn" onclick="send()">Print</button>
    <div id="status"></div>
  </div>

  <script>
    async function send() {
      const url = document.getElementById("url").value.trim();
      const status = document.getElementById("status");
      const btn = document.getElementById("btn");

      if (!url) return;

      btn.disabled = true;
      status.className = "";
      status.textContent = "⏳ Henter og printer...";

      try {
        const r = await fetch("/print", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const data = await r.json();
        if (data.ok) {
          status.className = "ok";
          status.textContent = "✅ Sendt til printer!";
          document.getElementById("url").value = "";
        } else {
          status.className = "err";
          status.textContent = "❌ " + data.error;
        }
      } catch (e) {
        status.className = "err";
        status.textContent = "❌ Netværksfejl";
      } finally {
        btn.disabled = false;
      }
    }

    // Print ved Enter
    document.getElementById("url").addEventListener("keydown", e => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
